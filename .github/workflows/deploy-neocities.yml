name: Deploy to Neocities

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-neocities
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy directory
        run: |
          rm -rf public
          mkdir -p public
          cp ./*.html public/
          cp -R css public/css
          cp -R js public/js

      - name: Deploy to Neocities
        uses: bcomnes/deploy-to-neocities@v3.0.5
        with:
          api_key: ${{ secrets.NEOCITIES_API_TOKEN }}
          cleanup: false
          preview_before_deploy: true
          dist_dir: public
